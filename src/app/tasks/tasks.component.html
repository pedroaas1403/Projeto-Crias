@if (isAddingTask) {
  <app-new-task [userId]="userId" (close)="onCloseAddTask()"></app-new-task>
}

<section id="tasks">
  <header>
    <h2> {{  name }} tem essas pendências </h2>
    <menu>
    <button (click)="onStartAddTask()"> Add Pendência </button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks; track task.id) {
    <li>
      <app-task [task]="task" (complete)="onCompleteTask($event)"></app-task>
    </li>
    }
  </ul>
</section>
